name = "norasol-website"
main = "src/index.js"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

[vars]
GROQ_MODEL = "llama-3.3-70b-versatile"

[assets]
directory = "."
binding = "ASSETS"

[env.production]
name = "norasol-website-production"
main = "src/index.js"
routes = [
  { pattern = "norasol.workers.dev/*", zone_name = "workers.dev" }
]
